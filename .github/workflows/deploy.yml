name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload worker script via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Upload index.html as a worker asset via Cloudflare API
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/0996d179ba188c6786583dd4528dc899/workers/scripts/training-plan" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F 'metadata={"main_module":"worker.js"};type=application/json' \
            -F 'worker.js=@worker.js;type=application/javascript+module' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('"'"'success'"'"'), d.get('"'"'errors'"'"'))"
