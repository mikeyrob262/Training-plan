<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Mikey's Training App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#252D3A;--s1:#2E3849;--s2:#36435A;--s3:#3F506E;
--b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);
--t1:#F0F4FF;--t2:#8B9BB4;--t3:#5A6A84;
--green:#00C896;--gd:rgba(0,200,150,.12);
--blue:#4D9FFF;--bd:rgba(77,159,255,.12);
--orange:#FF7A45;--red:#FF5B5B;--purple:#A78BFA;--gold:#FFB938;
--r:16px;--rs:10px
}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.hdr{background:linear-gradient(180deg,#2C3749,#252D3A);padding:16px 20px 12px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--b1)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#00C896,#0095C8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-text{font-size:15px;font-weight:700;color:var(--t1)}
.hdr-btns{display:flex;gap:6px;align-items:center}
.hbtn{background:var(--s2);border:1px solid var(--b2);color:var(--t2);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.phase-pill{background:linear-gradient(135deg,#00C896,#0095C8);color:white;font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px}
.hdr-nav{display:flex;align-items:center;gap:12px}
.narr{background:var(--s2);border:1px solid var(--b2);color:var(--t2);width:38px;height:38px;border-radius:11px;font-size:22px;cursor:pointer;flex-shrink:0}
.narr:disabled{opacity:.25}
.winfo{flex:1}
.wphase{font-size:12px;font-weight:600;color:var(--green);margin-bottom:1px}
.wtitle{font-size:22px;font-weight:800;color:var(--t1);cursor:pointer;background:none;border:none;padding:0;letter-spacing:-.5px}
.dots{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;padding:8px 0 2px}
.dots::-webkit-scrollbar{display:none}
.dot{flex-shrink:0;height:4px;border-radius:2px;cursor:pointer;transition:all .2s}
.screen{display:none;padding-bottom:50px}
.screen.active{display:block}
input:focus,textarea:focus{outline:none;border-color:var(--green)!important}
.card{background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);overflow:hidden;margin:0 16px 10px}
.card-hdr{background:var(--s3);padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.section-title{padding:18px 16px 8px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.goal-banner{background:linear-gradient(135deg,rgba(0,200,150,.15),rgba(0,149,200,.1));border:1px solid rgba(0,200,150,.2);border-radius:var(--r);padding:14px 16px;margin:14px 16px 0}
.goal-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:4px}
.goal-text{font-size:14px;color:var(--t1);font-weight:500;line-height:1.4}
.wo-card{background:var(--s1);margin:0 16px 10px;border-radius:var(--r);border:1px solid var(--b1);overflow:hidden}
.wo-main{display:flex;align-items:flex-start;padding:14px;gap:12px}
.wo-check{width:26px;height:26px;border:2px solid var(--b2);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;background:transparent;font-size:12px;font-weight:700;color:white;transition:all .15s}
.wo-check.on{background:var(--green);border-color:var(--green)}
.wo-day{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.06em}
.wo-sess{font-size:15px;font-weight:700;color:var(--t1);margin:2px 0}
.wo-detail{font-size:13px;color:var(--t2);line-height:1.45}
.wo-footer{border-top:1px solid var(--b1);display:flex;padding:10px 14px;gap:10px;background:var(--s2)}
.wof{flex:1}
.wof-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:3px}
.wof-planned{font-size:12px;color:var(--t2);font-weight:500}
.wof-input{font-size:13px;border:none;border-bottom:1px solid var(--b2);background:transparent;color:var(--t1);width:100%;padding:2px 0;font-family:inherit}
.wof-input::placeholder{color:var(--t3)}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.04em}
.b-hard{background:rgba(255,91,91,.12);color:#FF5B5B;border:1px solid rgba(255,91,91,.2)}
.b-mod{background:rgba(77,159,255,.12);color:#4D9FFF;border:1px solid rgba(77,159,255,.2)}
.b-easy{background:rgba(0,200,150,.12);color:#00C896;border:1px solid rgba(0,200,150,.2)}
.b-emod{background:rgba(255,185,56,.12);color:#FFB938;border:1px solid rgba(255,185,56,.2)}
.b-rest{background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.str-btn{margin-top:9px;background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.25);color:var(--green);font-size:12px;font-weight:700;padding:7px 14px;border-radius:20px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.swap-btn-small{margin-top:6px;background:transparent;border:1px solid var(--b2);color:var(--t3);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit}
.nutr-table{background:var(--s1);margin:0 16px 10px;border-radius:var(--r);border:1px solid var(--b1);overflow:hidden}
.nutr-head{display:grid;grid-template-columns:36px 46px 90px 60px 100px 1fr 1fr 24px;background:var(--s3);padding:8px 12px;gap:5px}
.nth{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.nrow{display:grid;grid-template-columns:36px 46px 90px 60px 100px 1fr 1fr 24px;padding:9px 12px;gap:5px;border-bottom:1px solid var(--b1);align-items:center}
.nrow.alt{background:rgba(255,255,255,.02)}
.nrow:last-child{border-bottom:none}
.nd{font-size:12px;font-weight:700;color:var(--t1)}
.nv{font-size:10px;color:var(--t2)}
.nc{font-size:10px;font-weight:700;color:var(--t1)}
.nbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}
.ncheck{width:20px;height:20px;border:2px solid var(--b2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;background:transparent;justify-self:center;transition:all .15s}
.ncheck.on{background:var(--green);border-color:var(--green)}
.ci-card{background:var(--s1);margin:0 16px 10px;border-radius:var(--r);border:1px solid var(--b1);overflow:hidden}
.ci-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1)}
.ci-field{background:var(--s1);padding:12px 16px}
.ci-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px}
.ci-input{font-size:18px;border:none;border-bottom:1.5px solid var(--b2);background:transparent;color:var(--t1);width:100%;font-weight:700;padding:0;font-family:inherit}
.ci-input::placeholder{color:var(--t3)}
.ci-notes{padding:12px 16px;background:var(--s1)}
.notes-ta{font-size:14px;border:none;border-bottom:1.5px solid var(--b2);background:transparent;color:var(--t1);width:100%;padding:0;resize:none;font-family:inherit}
.notes-ta::placeholder{color:var(--t3)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:30px;border-top:1px solid var(--b2)}
.modal-handle{width:40px;height:4px;background:var(--b2);border-radius:2px;margin:14px auto 0}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 10px}
.modal-title{font-size:20px;font-weight:800;color:var(--t1)}
.modal-close{background:var(--s2);border:1px solid var(--b1);color:var(--t2);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer}
.ex-card{background:var(--s2);margin:8px 16px;border-radius:var(--rs);border:1px solid var(--b1);overflow:hidden}
.ex-hdr{padding:14px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.ex-name{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px}
.ex-tip{font-size:11px;color:var(--t3);line-height:1.3}
.ex-swap{font-size:11px;border:1px solid var(--b2);border-radius:8px;padding:5px 10px;background:var(--s1);color:var(--blue);font-weight:600;cursor:pointer;max-width:130px}
.set-hdr-row,.set-row{display:grid;grid-template-columns:28px 1fr 72px 72px 34px;gap:6px;padding:8px 14px;align-items:center;border-top:1px solid var(--b1)}
.set-num{font-size:12px;font-weight:700;color:var(--t3);text-align:center}
.set-prev{font-size:11px;color:var(--t3);text-align:center}
.set-inp{font-size:14px;border:none;border-bottom:1.5px solid var(--b2);background:transparent;text-align:center;padding:4px 0;width:100%;color:var(--t1);font-family:inherit}
.set-inp::placeholder{color:var(--t3)}
.set-chk{width:28px;height:28px;border:2px solid var(--b2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;background:transparent;justify-self:center;transition:all .15s}
.set-chk.on{background:var(--green);border-color:var(--green)}
.set-row.done{background:rgba(0,200,150,.05)}
.finish-btn{margin:16px;background:linear-gradient(135deg,#00C896,#0095C8);border:none;color:white;font-size:16px;font-weight:700;padding:16px;border-radius:14px;width:calc(100% - 32px);cursor:pointer}
.back-btn{background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-size:13px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}
.stat-card{background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);padding:16px}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}
.stat-val{font-size:30px;font-weight:800;letter-spacing:-1px}
.chart-card{background:var(--s1);margin:10px 16px 0;border-radius:var(--r);border:1px solid var(--b1);padding:16px}
.chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:12px}
.pr-list{background:var(--s1);margin:10px 16px 0;border-radius:var(--r);border:1px solid var(--b1);overflow:hidden}
.pr-item{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--b1)}
.pr-item:last-child{border-bottom:none}
.pr-ex{font-size:14px;font-weight:600;color:var(--t1)}
.pr-val{font-size:16px;font-weight:800;color:var(--green)}
.hist-card{background:var(--s1);margin:0 16px 10px;border-radius:var(--r);border:1px solid var(--b1);padding:16px}
.meta-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.meta-pill{background:var(--s2);border:1px solid var(--b1);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--t2);font-weight:500}
.picker-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;display:none}
.picker-bg.open{display:block}
.picker-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:24px 24px 0 0;padding:16px;z-index:200;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto;border-top:1px solid var(--b2)}
.picker-sheet.open{transform:translateY(0)}
.pk-item{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:14px 8px;text-align:center;cursor:pointer}
.pk-item.cur{background:var(--gd);border-color:rgba(0,200,150,.3)}
.pk-num{font-size:18px;font-weight:800;color:var(--t1)}
.pk-item.cur .pk-num{color:var(--green)}
.pk-phase{font-size:9px;color:var(--t3);margin-top:2px}
.nutr-date-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0}
.date-nav-btn{background:var(--s2);border:1px solid var(--b1);color:var(--t2);width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 0}
.macro-card{background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);padding:12px;text-align:center}
.macro-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.meal-card{background:var(--s1);margin:10px 16px 0;border-radius:var(--r);border:1px solid var(--b1);overflow:hidden}
.meal-hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 16px}
.meal-title{font-size:14px;font-weight:700;color:var(--t1)}
.meal-cal{font-size:12px;color:var(--t3)}
.meal-add{background:var(--gd);border:1px solid rgba(0,200,150,.2);color:var(--green);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:inherit}
.food-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-top:1px solid var(--b1)}
.food-name{font-size:13px;font-weight:500;color:var(--t1)}
.food-macros{font-size:11px;color:var(--t3);margin-top:2px}
.food-remove{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px}
.water-card{background:var(--s1);margin:10px 16px 0;border-radius:var(--r);border:1px solid var(--b1);padding:14px 16px}
.act-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}
.act-card{background:var(--s1);margin:0 16px 10px;border-radius:var(--r);border:1px solid var(--b1);overflow:hidden}
.act-card-main{padding:14px 16px 10px}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 16px 14px}
.metric-chip{background:var(--s2);border-radius:var(--rs);padding:9px 6px;text-align:center}
.metric-label{font-size:9px;color:var(--t3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.metric-val{font-size:13px;font-weight:700;color:var(--t1)}
.ftp-banner{background:linear-gradient(135deg,rgba(0,200,150,.15),rgba(0,149,200,.1));border:1px solid rgba(0,200,150,.2);margin:10px 16px 0;border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px;display:block}
.form-input{font-size:14px;border:1px solid var(--b2);border-radius:var(--rs);padding:10px 12px;width:100%;background:var(--s2);color:var(--t1);font-family:inherit}
.form-select{font-size:14px;border:1px solid var(--b2);border-radius:var(--rs);padding:10px 12px;width:100%;background:var(--s2);color:var(--t1);font-family:inherit}
.save-btn{background:linear-gradient(135deg,#00C896,#0095C8);border:none;color:white;font-size:16px;font-weight:700;padding:16px;border-radius:var(--rs);width:100%;cursor:pointer;margin-top:4px}
.food-search-wrap{padding:0 16px 12px}
.food-search-input{width:100%;font-size:15px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rs);padding:11px 14px;color:var(--t1);font-family:inherit}
.food-search-input::placeholder{color:var(--t3)}
.settings-card{background:var(--s1);margin:0 16px 10px;border-radius:var(--r);border:1px solid var(--b1);overflow:hidden}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
.settings-input{font-size:15px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;color:var(--t1);width:100%;font-family:inherit}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b2);color:var(--t1);padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4);white-space:nowrap;pointer-events:none}
</style>

function doSwap(w,idx,sess){
  // Remove any existing swap panel
  var existing = document.getElementById('swap-panel-'+w+'-'+idx);
  if(existing){ existing.remove(); return; }

  var opts = SWAPS[sess] || ['Outdoor Ride','Easy Run','Zwift Zone 2','Rest Day'];
  var card = document.getElementById('wo-card-'+w+'-'+idx);
  if(!card) return;

  var panel = document.createElement('div');
  panel.id = 'swap-panel-'+w+'-'+idx;
  panel.style.cssText = 'padding:12px 14px;background:var(--s3);border-top:1px solid var(--b2)';

  var label = document.createElement('div');
  label.style.cssText = 'font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:8px';
  label.textContent = 'Swap "'+sess+'" with:';
  panel.appendChild(label);

  var wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px';

  opts.forEach(function(opt){
    var btn = document.createElement('button');
    btn.textContent = opt;
    btn.style.cssText = 'background:var(--s2);border:1px solid var(--b2);color:var(--blue);font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:-apple-system,sans-serif';
    btn.onclick = function(){
      var s=ws(w);
      if(!s.swaps)s.swaps={};
      s.swaps[idx]=opt;
      sv();
      renderWeek();
      toast('Swapped to: '+opt);
    };
    wrap.appendChild(btn);
  });

  var cancel = document.createElement('button');
  cancel.textContent = 'Cancel';
  cancel.style.cssText = 'background:transparent;border:1px solid var(--b1);color:var(--t3);font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:-apple-system,sans-serif';
  cancel.onclick = function(){ panel.remove(); };
  wrap.appendChild(cancel);

  panel.appendChild(wrap);
  card.appendChild(panel);
}

  exs.forEach(function(ex,ei){
    var alts=(altMap[ei]||[]).filter(function(a){return a!==ex[0];});

      +'<div><div class="ex-name" id="exn_'+letter+'_'+ei+'">'+ex[0]+'</div>'
      +'<div class="ex-tip">'+ex[3]+'</div></div>'
      +'<select class="ex-swap" id="ex-sel-'+letter+'-'+ei+'" data-l="'+letter+'" data-ei="'+ei+'"><option value="">Swap</option>'+opts+'</select>'
      +'</div>'
      +'<div class="set-hdr-row"><div class="set-num" style="font-size:10px;color:var(--t3)">SET</div>'
      +'<div class="set-prev" style="font-size:10px;color:var(--t3)">PREV</div>'
      +'<div style="font-size:10px;color:var(--t3);text-align:center">LBS</div>'
      +'<div style="font-size:10px;color:var(--t3);text-align:center">REPS</div>'
      +'<div></div></div>';
    for(var si=0;si<3;si++){
      var sd=(s.str&&s.str[letter]&&s.str[letter][ei]&&s.str[letter][ei][si])||{};
      var prevTxt=getPrev(letter,w,ei,si);
      html+='<div class="set-row'+(sd.done?' done':'')+'" id="sr_'+letter+'_'+ei+'_'+si+'">'
        +'<div class="set-num">'+(si+1)+'</div>'
        +'<div class="set-prev" id="sprev_'+letter+'_'+ei+'_'+si+'">'+prevTxt+'</div>'
        +'<input type="number" placeholder="lbs" class="set-inp" id="sw_'+letter+'_'+ei+'_'+si+'" value="'+(sd.w||'')+'">'
        +'<input type="number" placeholder="'+ex[2]+'" class="set-inp" id="sr2_'+letter+'_'+ei+'_'+si+'" value="'+(sd.r||'')+'">'
        +'<div class="set-chk'+(sd.done?' on':'')+'" id="sc_'+letter+'_'+ei+'_'+si+'" onclick="toggleSet(\''+letter+'\','+ei+','+si+')">'+( sd.done?'✓':'')+'</div>'

    }
    html+='</div>';
  });
  html+='<button class="finish-btn" onclick="finishStr(\''+letter+'\')">Finish Workout ✓</button></div>';
  modal.innerHTML=html;
  modal.classList.add('open');
  document.body.style.overflow='hidden';
}

function getPrev(letter,w,ei,si){
  for(var pw=w-1;pw>=1;pw--){
    var ps=ws(pw);
    if(ps.str&&ps.str[letter]&&ps.str[letter][ei]&&ps.str[letter][ei][si]&&ps.str[letter][ei][si].w){
      return ps.str[letter][ei][si].w+'×'+(ps.str[letter][ei][si].r||'?');
    }
  }
  return '—';
}

function closeStrength(letter){
  var modal=document.getElementById('modal-str-'+letter);
  if(modal)modal.classList.remove('open');
  document.body.style.overflow='';
}

function saveSets(letter){
  var s=ws(curStrW);
  if(!s.str)s.str={};
  if(!s.str[letter])s.str[letter]={};
  var exs=letter==='A'?FBA:FBB;
  for(var ei=0;ei<exs.length;ei++){
    if(!s.str[letter][ei])s.str[letter][ei]={};
    for(var si=0;si<3;si++){
      var we=document.getElementById('sw_'+letter+'_'+ei+'_'+si);
      var re=document.getElementById('sr2_'+letter+'_'+ei+'_'+si);
      var ce=document.getElementById('sc_'+letter+'_'+ei+'_'+si);
      s.str[letter][ei][si]={w:we?we.value:'',r:re?re.value:'',done:ce?ce.classList.contains('on'):false};
    }
  }
  sv();
}

function toggleSet(letter,ei,si){
  var ce=document.getElementById('sc_'+letter+'_'+ei+'_'+si);
  var re=document.getElementById('sr_'+letter+'_'+ei+'_'+si);
  if(!ce)return;
  var on=ce.classList.contains('on');
  if(on){ce.classList.remove('on');ce.textContent='';if(re)re.classList.remove('done');}
  else{ce.classList.add('on');ce.textContent='✓';if(re)re.classList.add('done');}
  saveSets(letter);
}

function swapEx(letter,ei,newName){
  if(!newName)return;
  var el=document.getElementById('exn_'+letter+'_'+ei);
  if(el)el.textContent=newName;
}

function finishStr(letter){
  saveSets(letter);
  closeStrength(letter);
  var dayMap={A:0,B:2};
  var idx=dayMap[letter];
  if(idx!==undefined){
    var s=ws(curStrW);
    s.wo[idx]=true;sv();updateDots();
    var el=document.getElementById('WC'+curStrW+'_'+idx);
    if(el){el.className='wo-check on';el.textContent='✓';}
  }
  toast('Workout complete! 💪');
}

// ─── PROGRESS SCREEN ─────────────────────────────────────────
function renderProg(){
  var t=document.getElementById('screen-prog');
  if(!t)return;
  var wts=[],ens=[],sls=[],cos=[];
  for(var w=1;w<=17;w++){
    var s=ws(w);
    wts.push(s.ci&&s.ci.weight?parseFloat(s.ci.weight):null);
    ens.push(s.ci&&s.ci.energy?parseFloat(s.ci.energy):null);
    sls.push(s.ci&&s.ci.sleep?parseFloat(s.ci.sleep):null);
    cos.push(Object.values(s.wo).filter(Boolean).length);
  }
  var td=cos.reduce(function(a,b){return a+b;},0);
  var wl=wts.filter(function(v){return v!==null;}).length;
  var fw=null,lw=null;
  for(var i=0;i<wts.length;i++){if(wts[i]!==null&&fw===null)fw=wts[i];}
  for(var i=wts.length-1;i>=0;i--){if(wts[i]!==null){lw=wts[i];break;}}
  var wch=fw!==null&&lw!==null&&fw!==lw?(lw-fw).toFixed(1):null;
  var ae=ens.filter(function(v){return v!==null;});
  var avgE=ae.length?(ae.reduce(function(a,b){return a+b;},0)/ae.length).toFixed(1):null;
  var totalPct=Math.min(100,Math.round((td/102)*100));

  var html='<div style="padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b1)">'
    +'<button class="back-btn" onclick="goHome()">&#8592;</button>'
    +'<div><div style="font-size:20px;font-weight:800;color:var(--t1)">Progress</div>'
    +'<div style="font-size:12px;color:var(--t3)">17-Week Plan</div></div></div>';

  // Hero section — big ring + stats
  var r=52,circ=2*Math.PI*r,dash=circ*(totalPct/100),gap=circ-dash;
  html+='<div style="padding:20px;display:flex;align-items:center;gap:16px">'
    +'<svg width="120" height="120" viewBox="0 0 130 130" style="flex-shrink:0">'
    +'<defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00C896"/><stop offset="100%" stop-color="#0095C8"/></linearGradient></defs>'

function mkSVG(data,color,minY,maxY,fmtY,bars){
  var W=320,H=130,pl=34,pr=8,pt=8,pb=20;
  var cw2=W-pl-pr,ch=H-pt-pb;
  var valid=data.map(function(v,i){return{v:v,i:i};}).filter(function(d){return d.v!==null&&!isNaN(d.v);});
  var yMin=minY!==null?minY:(valid.length?Math.min.apply(null,valid.map(function(d){return d.v;})):0);
  var yMax2=maxY!==null?maxY:(valid.length?Math.max.apply(null,valid.map(function(d){return d.v;})):10);
  if(yMin===yMax2){yMin-=1;yMax2+=1;}
  var xS=cw2/16;
  function px(i){return pl+i*xS;}
  function py(v){return pt+ch-((v-yMin)/(yMax2-yMin))*ch;}
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;overflow:visible">';
  for(var g=0;g<=4;g++){
    var gv=yMin+(yMax2-yMin)*(g/4),gy=py(gv);
    s+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';
    s+='<text x="'+(pl-3)+'" y="'+(gy+3)+'" font-size="8" fill="rgba(255,255,255,.3)" text-anchor="end">'+(fmtY?fmtY(gv):Math.round(gv))+'</text>';
  }
  for(var xi=0;xi<=16;xi+=4){s+='<text x="'+px(xi)+'" y="'+(H-4)+'" font-size="8" fill="rgba(255,255,255,.3)" text-anchor="middle">W'+(xi+1)+'</text>';}
  if(bars){
    var bw=xS*0.6;
    data.forEach(function(v,i){
      if(v===null||isNaN(v))return;
      var bh=(v/yMax2)*ch,bx=px(i)-bw/2,by=pt+ch-bh;
      var bc=v>=5?'#00C896':v>=3?'#FFB938':'#FF5B5B';
      if(v>0)s+='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+bc+'" rx="3"/>';
    });
  }else if(valid.length>1){
    var area='M '+px(valid[0].i)+' '+py(yMin)+' L '+px(valid[0].i)+' '+py(valid[0].v);
    for(var vi=1;vi<valid.length;vi++)area+=' L '+px(valid[vi].i)+' '+py(valid[vi].v);
    area+=' L '+px(valid[valid.length-1].i)+' '+py(yMin)+' Z';
    s+='<path d="'+area+'" fill="'+color+'" opacity="0.1"/>';
    s+='<path d="M '+valid.map(function(d){return px(d.i)+' '+py(d.v);}).join(' L ')+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    valid.forEach(function(d){s+='<circle cx="'+px(d.i)+'" cy="'+py(d.v)+'" r="3.5" fill="white" stroke="'+color+'" stroke-width="2"/>';});
  }else if(valid.length===1){
    s+='<circle cx="'+px(valid[0].i)+'" cy="'+py(valid[0].v)+'" r="5" fill="'+color+'"/>';
  }else{
    s+='<text x="'+(W/2)+'" y="'+(H/2)+'" font-size="12" fill="rgba(255,255,255,.2)" text-anchor="middle">No data yet</text>';
  }
  return s+'</svg>';
}

// ─── ACTIVITY ────────────────────────────────────────────────

        +'<div><div style="font-size:15px;font-weight:700;color:var(--t1)">'+emoji+' '+a.name+'</div>'
        +'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate()+'</div></div>'
        +'<button onclick="delAct('+i+')" style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer">×</button></div>'
        +'</div>'
        +'<div class="metric-grid">';
      if(a.dist)html+='<div class="metric-chip"><div class="metric-label">Distance</div><div class="metric-val">'+a.dist+' mi</div></div>';
      if(a.time)html+='<div class="metric-chip"><div class="metric-label">Time</div><div class="metric-val">'+a.time+'</div></div>';
      if(a.avgPower)html+='<div class="metric-chip"><div class="metric-label">Avg Power</div><div class="metric-val">'+a.avgPower+'w</div></div>';
      if(a.avgHR)html+='<div class="metric-chip"><div class="metric-label">Avg HR</div><div class="metric-val">'+a.avgHR+' bpm</div></div>';
      if(a.tss)html+='<div class="metric-chip"><div class="metric-label">TSS</div><div class="metric-val">'+a.tss+'</div></div>';
      if(a.elev)html+='<div class="metric-chip"><div class="metric-label">Elevation</div><div class="metric-val">'+a.elev+"'</div></div>";

      if(a.notes)html+='<div style="font-size:12px;color:var(--t3);font-style:italic;padding:0 16px 14px">"'+a.notes+'"</div>';

  }else{
    html+='<div style="padding:40px;text-align:center;color:var(--t3)"><div style="font-size:40px;margin-bottom:8px">🚴</div><div style="font-size:14px">No activities yet</div><div style="font-size:12px;margin-top:4px">Tap + Log to add your first one</div></div>';

  Object.keys(ciMap).forEach(function(id){
    var el=document.getElementById('ci-'+id);
    if(el) el.onchange=function(){saveCI(cw,ciMap[id],this.value);};
  });
  // Bind workout actual/RPE fields
  for(var bi=0;bi<workouts.length;bi++){
    (function(idx2){
      var af2=document.getElementById('af-'+w+'-'+idx2);
      var rf2=document.getElementById('rf-'+w+'-'+idx2);
      if(af2) af2.onchange=function(){saveField(cw,idx2,'a',this.value);};

function delAct(idx){if(!st.activities)return;var sorted=st.activities.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});var act=sorted[idx];var ri=st.activities.indexOf(act);if(ri>=0){st.activities.splice(ri,1);sv();renderAct();}}

function openActAdd(){
  var d=new Date();
  document.getElementById('act-date').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  document.getElementById('act-name').value='';
  document.getElementById('act-dist').value='';
  document.getElementById('act-time').value='';
  document.getElementById('act-power').value='';
  document.getElementById('act-tss').value='';
  document.getElementById('act-hr').value='';
  document.getElementById('act-elev').value='';
  document.getElementById('act-notes').value='';
  document.getElementById('modal-act-add').classList.add('open');
}
function closeActAdd(){document.getElementById('modal-act-add').classList.remove('open');}

function saveAct(){
  var type=document.getElementById('act-type').value;
  var name=document.getElementById('act-name').value||type+' — Week '+cw;
  var act={type:type,name:name,date:document.getElementById('act-date').value,dist:document.getElementById('act-dist').value,time:document.getElementById('act-time').value,avgPower:document.getElementById('act-power').value,tss:document.getElementById('act-tss').value,avgHR:document.getElementById('act-hr').value,elev:document.getElementById('act-elev').value,notes:document.getElementById('act-notes').value};
  if(!st.activities)st.activities=[];
  st.activities.push(act);sv();closeActAdd();renderAct();toast('Activity saved!');
}

// Auto TSS calc
document.getElementById('act-power').addEventListener('change',function(){
  var ftp=st.ftp||185,pow=parseFloat(this.value)||0;
  var timeStr=document.getElementById('act-time').value||'';
  var parts=timeStr.split(':'),secs=0;
  if(parts.length===2)secs=parseInt(parts[0])*3600+parseInt(parts[1])*60;
  if(pow&&secs&&ftp){var IF=pow/ftp;document.getElementById('act-tss').value=Math.round((secs*pow*IF)/(ftp*3600)*100);}
});

// ─── SETTINGS ────────────────────────────────────────────────
function renderSet(){
  var t=document.getElementById('screen-set');if(!t)return;
  var total=0;for(var w=1;w<=17;w++){total+=Object.values(ws(w).wo).filter(Boolean).length;}
  var html='<div style="padding:14px 16px;display:flex;align-items:center;gap:10px">'

    +'<div><div class="ci-label">Weight (lbs)</div><input class="settings-input" type="number" value="'+(st.weight||'')+'" placeholder="162" onchange="st.weight=this.value;sv()"></div>'
    +'<div><div class="ci-label">FTP (watts)</div><input class="settings-input" type="number" value="'+(st.ftp||'')+'" placeholder="185" onchange="st.ftp=parseInt(this.value);sv()"></div>'
    +'<div><div class="ci-label">Current Week</div><div style="font-size:22px;font-weight:800;color:var(--green);margin-top:4px">Week '+cw+'</div></div>'

  html+='<div class="settings-card"><div class="card-hdr">Stats</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1)">'
    +'<div style="background:var(--s1);padding:14px 16px"><div class="ci-label">Workouts Done</div><div style="font-size:22px;font-weight:800;color:var(--green)">'+total+'</div></div>'
    +'<div style="background:var(--s1);padding:14px 16px"><div class="ci-label">Activities Logged</div><div style="font-size:22px;font-weight:800;color:var(--blue)">'+(st.activities?st.activities.length:0)+'</div></div>'

  html+='<div class="settings-card"><div class="card-hdr">Data &amp; Backup</div><div style="padding:14px 16px">'

    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<button onclick="exportData()" style="background:linear-gradient(135deg,#00C896,#0095C8);border:none;color:white;font-size:13px;font-weight:700;padding:11px 20px;border-radius:12px;cursor:pointer">⬇️ Export Backup</button>'
    +'<button onclick="importData()" style="background:var(--s2);border:1px solid var(--b2);color:var(--t2);font-size:13px;font-weight:700;padding:11px 20px;border-radius:12px;cursor:pointer">⬆️ Restore Backup</button>'
    +'</div></div></div>';

  html+='<div class="settings-card"><div class="card-hdr">App Info</div><div style="padding:16px">'
    +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'
    +'<div style="width:48px;height:48px;background:linear-gradient(135deg,#00C896,#0095C8);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px">🏆</div>'
    +'<div><div style="font-size:17px;font-weight:800;color:var(--t1)">Mikey Training App</div>'
    +'<div style="font-size:12px;color:var(--t3)">Version 5.0 · Built with Claude</div></div></div>'
    +'<p style="font-size:12px;color:var(--t3);line-height:1.5">17-week training companion. Cycling · Running · Strength · Nutrition · Progress.</p>'
    +'</div></div>';

  html+='<div style="height:50px"></div>';
  t.innerHTML=html;
  // Bind CI inputs after render
  var ciMap={wt:'weight',rhr:'rhr',en:'energy',sl:'sleep',nt:'notes'};
  Object.keys(ciMap).forEach(function(id){
    var el=document.getElementById('ci-'+id);
    if(el) el.onchange=function(){saveCI(cw,ciMap[id],this.value);};
  });
  // Bind workout actual/RPE fields
  for(var bi=0;bi<workouts.length;bi++){
    (function(idx2){
      var af2=document.getElementById('af-'+w+'-'+idx2);
      var rf2=document.getElementById('rf-'+w+'-'+idx2);
      if(af2) af2.onchange=function(){saveField(cw,idx2,'a',this.value);};
      if(rf2) rf2.onchange=function(){saveField(cw,idx2,'r',this.value);};

}

function exportData(){
  var data={version:1,exported:new Date().toISOString(),data:st};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='mikey_training_backup_'+new Date().toISOString().split('T')[0]+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup downloaded!');
}
function importData(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){try{var p=JSON.parse(ev.target.result);if(p.data){st=p.data;sv();renderWeek();toast('Data restored!');}}catch(er){toast('Invalid backup file');}};
    reader.readAsText(file);
  };
  inp.click();
}

// ─── EVENT LISTENERS ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  // Header buttons
  document.getElementById('btn-prog').onclick=function(){renderProg();showScreen('prog');};
  document.getElementById('btn-nutr').onclick=function(){nutrDate=getTodayKey();renderNutr();showScreen('nutr');};
  document.getElementById('btn-act').onclick=function(){renderAct();showScreen('act');};
  document.getElementById('btn-set').onclick=function(){renderSet();showScreen('set');};
  document.getElementById('btn-prev').onclick=function(){goWeek(cw-1);};
  document.getElementById('btn-next').onclick=function(){goWeek(cw+1);};
  document.getElementById('btn-week-title').onclick=openPicker;
  document.getElementById('picker-bg').onclick=closePicker;
  document.getElementById('food-close').onclick=closeFood;
  document.getElementById('act-add-close').onclick=closeActAdd;
  document.getElementById('act-save-btn').onclick=saveAct;
  document.getElementById('food-search-input').oninput=function(){renderFoodList(this.value.trim());};

  // Delegate swapEx selects
  document.body.addEventListener('change', function(e){
    if(e.target && e.target.classList.contains('ex-swap')){
      var l=e.target.dataset.l, ei=e.target.dataset.ei, val=e.target.value;
      if(l && ei && val) swapEx(l, parseInt(ei), val);
    }
  });
  // Load saved custom foods
  if(st.customFoods){st.customFoods.forEach(function(f){if(!CF.find(function(x){return x.n===f.n;}))CF.push(f);});}
  // Initial render
  updateHeader();
  updateDots();
  // Check if plan is complete
  if(st.planComplete) {
    renderComplete();
    showScreen('complete');
  } else {
    renderWeek();
  }
});

function renderComplete() {
  var t = document.getElementById('screen-complete');
  if(!t) return;
  // Tally stats
  var totalWo = 0, totalMiles = 0, totalTSS = 0;
  for(var w=1;w<=17;w++) { totalWo += Object.values(ws(w).wo).filter(Boolean).length; }
  if(st.activities) { st.activities.forEach(function(a){ totalMiles+=parseFloat(a.dist)||0; totalTSS+=parseFloat(a.tss)||0; }); }
  var startW = null, endW = null;
  for(var w=1;w<=17;w++) { var s=ws(w); if(s.ci&&s.ci.weight&&startW===null) startW=parseFloat(s.ci.weight); }
  for(var w=17;w>=1;w--) { var s=ws(w); if(s.ci&&s.ci.weight&&endW===null) { endW=parseFloat(s.ci.weight); break; } }
  var wChange = (startW&&endW&&startW!==endW) ? (endW-startW).toFixed(1) : null;

  var html = '<div style="padding:40px 24px;text-align:center">'
    + '<div style="font-size:72px;margin-bottom:16px">🏆</div>'
    + '<div style="font-size:28px;font-weight:800;color:var(--t1);margin-bottom:8px">Plan Complete!</div>'
    + '<div style="font-size:16px;color:var(--t2);margin-bottom:32px;line-height:1.5">You finished all 17 weeks.<br>That took serious commitment.</div>'
    + '</div>';

  html += '<div class="stat-grid" style="margin-bottom:0">'
    + '<div class="stat-card"><div class="stat-label">Workouts Done</div><div class="stat-val" style="color:var(--green)">'+totalWo+'</div></div>'
    + '<div class="stat-card"><div class="stat-label">Miles Logged</div><div class="stat-val" style="color:var(--blue)">'+totalMiles.toFixed(0)+'</div></div>'
    + '<div class="stat-card"><div class="stat-label">Total TSS</div><div class="stat-val" style="color:var(--purple)">'+totalTSS.toFixed(0)+'</div></div>'
    + '<div class="stat-card"><div class="stat-label">Weight Change</div><div class="stat-val" style="color:var(--gold)">'+(wChange?(parseFloat(wChange)>0?'+'+wChange:wChange)+' lbs':'—')+'</div></div>'
    + '</div>';

  html += '<div style="padding:24px 16px 8px">'
    + '<div style="background:linear-gradient(135deg,rgba(0,200,150,.15),rgba(0,149,200,.1));border:1px solid rgba(0,200,150,.2);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:12px">'
    + '<div style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:8px">What would you like to do next?</div>'
    + '<div style="display:flex;flex-direction:column;gap:10px">'
    + '<button onclick="reviewPlan()" style="background:linear-gradient(135deg,#00C896,#0095C8);border:none;color:white;font-size:15px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer">📊 Review My Progress</button>'
    + '<button onclick="restartPlan()" style="background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-size:15px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer">🔄 Start a New 17-Week Cycle</button>'
    + '<button onclick="maintenanceMode()" style="background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-size:15px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer">🚴 Continue in Maintenance Mode</button>'
    + '</div></div></div>';

  html += '<div style="height:50px"></div>';
  t.innerHTML = html;
}

function reviewPlan() {
  renderProg();
  showScreen('prog');
}

function restartPlan() {
  if(!confirm('Start a new 17-week cycle? Your history will be archived.')) return;
  // Archive current data
  if(!st.archive) st.archive = [];
  st.archive.push({date: new Date().toISOString(), data: JSON.parse(JSON.stringify(st))});
  // Reset weekly data but keep profile
  for(var w=1;w<=17;w++) { st[w] = {wo:{},nu:{},ci:{},fi:{},str:{}}; }
  st.planComplete = false;
  st.activities = [];
  st.nutrLog = {};
  sv();
  cw = 1;
  updateHeader();
  updateDots();
  renderWeek();
  showScreen('train');
  toast('New cycle started! Good luck! 💪');
}

function maintenanceMode() {
  st.planComplete = false;
  st.maintenanceMode = true;
  sv();
  cw = 17;
  renderWeek();
  showScreen('train');
  toast('Maintenance mode — keep training!');
}

// Check if week 17 is complete and trigger celebration
function checkPlanComplete() {
  var w17 = ws(17);
  var done = Object.values(w17.wo).filter(Boolean).length;
  if(done >= WC[17] && WC[17] > 0 && !st.planComplete && !st.maintenanceMode) {
    st.planComplete = true;
    sv();
    setTimeout(function() {
      renderComplete();
      showScreen('complete');
      toast('🎉 You finished the plan!');
    }, 500);
  }
}

// Hook into toggleWo to check completion
var _origToggleWo = toggleWo;
toggleWo = function(w, idx) {
  _origToggleWo(w, idx);
  if(w === 17) checkPlanComplete();
};

</script>

    <div class="winfo">
      <div class="wphase" id="wphase-label">Foundation</div>
      <button class="wtitle" id="btn-week-title">Week 1 <span style="font-size:13px;opacity:.4">▾</span></button>
    </div>
    <button class="narr" id="btn-next">&#8250;</button>
  </div>
  <div class="dots" id="dots-row"></div>
</div>

<div id="screen-train" class="screen active"></div>
<div id="screen-prog" class="screen"></div>
<div id="screen-nutr" class="screen"></div>
<div id="screen-act" class="screen"></div>
<div id="screen-set" class="screen"></div>

<div class="picker-bg" id="picker-bg"></div>
<div class="picker-sheet" id="picker-sheet">
  <div class="modal-handle"></div>
  <div style="font-size:18px;font-weight:800;color:var(--t1);padding:14px 16px 14px;margin-bottom:0">Jump to week</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 16px" id="picker-grid"></div>
</div>

<div class="modal-bg" id="modal-str-A"></div>
<div class="modal-bg" id="modal-str-B"></div>

<div class="modal-bg" id="modal-food">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title">Add Food</span>
      <button class="modal-close" id="food-close">✕</button>
    </div>
    <div class="food-search-wrap">
      <input class="food-search-input" id="food-search-input" type="text" placeholder="Search foods...">
    </div>
    <div id="food-results" style="padding:0 16px"></div>
  </div>
</div>

<div class="modal-bg" id="modal-act-add">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title">Log Activity</span>
      <button class="modal-close" id="act-add-close">✕</button>
    </div>
    <div style="padding:0 16px">
      <div class="form-grid">
        <div><label class="form-label">Type</label>
          <select class="form-select" id="act-type">
            <option value="Ride">🚴 Outdoor Ride</option>
            <option value="Zwift">⚡ Zwift</option>
            <option value="Run">🏃 Run</option>
            <option value="Chase 2">🔥 Chase 2</option>
            <option value="Strength">💪 Strength</option>
          </select></div>
        <div><label class="form-label">Date</label>
          <input class="form-input" id="act-date" type="date"></div>
      </div>
      <div style="margin-bottom:10px"><label class="form-label">Activity Name</label>
        <input class="form-input" id="act-name" type="text" placeholder="e.g. Thursday Chase 2 — W1"></div>
      <div class="form-grid">
        <div><label class="form-label">Distance (mi)</label>
          <input class="form-input" id="act-dist" type="number" step="0.1" placeholder="24.5"></div>
        <div><label class="form-label">Time (h:mm)</label>
          <input class="form-input" id="act-time" type="text" placeholder="1:45"></div>
      </div>
      <div class="form-grid" id="power-fields">
        <div><label class="form-label">Avg Power (w)</label>
          <input class="form-input" id="act-power" type="number" placeholder="178"></div>
        <div><label class="form-label">TSS (auto)</label>
          <input class="form-input" id="act-tss" type="number" placeholder="—"></div>
      </div>
      <div class="form-grid">
        <div><label class="form-label">Avg HR (bpm)</label>
          <input class="form-input" id="act-hr" type="number" placeholder="142"></div>
        <div><label class="form-label">Elevation (ft)</label>
          <input class="form-input" id="act-elev" type="number" placeholder="1200"></div>
      </div>
      <div style="margin-bottom:14px"><label class="form-label">Notes</label>
        <textarea class="form-input" id="act-notes" rows="2" placeholder="How did it feel?"></textarea></div>
      <button class="save-btn" id="act-save-btn">Save Activity ✓</button>
    </div>
    <div style="height:20px"></div>
  </div>
</div>


<div id="screen-complete" class="screen"></div>

</body>
</html>
